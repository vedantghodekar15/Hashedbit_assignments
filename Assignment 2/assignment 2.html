<!DOCTYPE html>
<html>
<head>
    <title>JS Assignment 2</title>
</head>

<body>

<h1>JavaScript Assignment 2</h1>

<!-- Q1 -->
<h2>1. Even Numbers (1 to 100)</h2>
<button onclick="showEven()">Show Even Numbers</button>
<p id="even"></p>

<!-- Q2 -->
<h2>2. Calculator</h2>
<input type="number" id="num1" placeholder="Enter number 1">
<input type="number" id="num2" placeholder="Enter number 2">
<input type="text" id="operator" placeholder="Enter (+ - * /)">
<button onclick="calculate()">Calculate</button>
<p id="calc"></p>

<!-- Q3 -->
<h2>3. Tax Calculation</h2>
<input type="number" id="salary" placeholder="Enter salary">
<button onclick="calculateTax()">Find Tax</button>
<p id="tax"></p>

<!-- Q4 -->
<h2>4. Sum of Product of Digits</h2>
<input type="number" id="n1" placeholder="Enter number 1">
<input type="number" id="n2" placeholder="Enter number 2">
<button onclick="findSum()">Find Result</button>
<p id="sum"></p>

<script>
    // 1. Even Numbers
    function showEven() {
        let result = "";
        for (let i = 1; i <= 100; i++) {
            if (i % 2 === 0) {
                result += i + " ";
            }
        }
        document.getElementById("even").innerHTML = result;
    }

    // 2. Calculator
    function calculate() {
        let n1 = Number(document.getElementById("num1").value);
        let n2 = Number(document.getElementById("num2").value);
        let op = document.getElementById("operator").value;

        let result;

        switch(op) {
            case '+': result = n1 + n2; break;
            case '-': result = n1 - n2; break;
            case '*': result = n1 * n2; break;
            case '/': result = n2 !== 0 ? n1 / n2 : "Cannot divide by zero"; break;
            default: result = "Invalid operator";
        }

        document.getElementById("calc").innerHTML = "Result: " + result;
    }

    // 3. Tax
    function calculateTax() {
        let salary = Number(document.getElementById("salary").value);
        let tax;

        switch(true) {
            case (salary > 0 && salary <= 500000):
                tax = 0;
                break;
            case (salary <= 1000000):
                tax = salary * 0.10;
                break;
            case (salary <= 1500000):
                tax = salary * 0.20;
                break;
            case (salary > 1500000):
                tax = salary * 0.30;
                break;
            default:
                tax = "Invalid input";
        }

        document.getElementById("tax").innerHTML = "Tax: " + tax;
    }

    // 4. Sum of Products
    function findSum() {
        let n1 = document.getElementById("n1").value;
        let n2 = document.getElementById("n2").value;

        let max = Math.max(n1.length, n2.length);

        n1 = n1.padStart(max, '0');
        n2 = n2.padStart(max, '0');

        let sum = 0;

        for (let i = 0; i < max; i++) {
            sum += n1[i] * n2[i];
        }

        document.getElementById("sum").innerHTML = "Result: " + sum;
    }
</script>

</body>
</html>
