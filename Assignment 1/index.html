<!DOCTYPE html>
<html>
<head>
    <title>Simple Webpage</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        /* Header */
        header {
            background-color: black;
            color: white;
            padding: 10px;
        }

        .logo {
            float: left;
        }

        .social {
            float: right;
        }

        /* Menu */
        nav {
            background-color: gray;
            text-align: center;
            padding: 10px;
        }

        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }

        /* Sidebar */
        aside {
            width: 25%;
            float: left;
            background-color: lightgray;
            height: 300px;
            padding: 10px;
        }

        /* Main */
        main {
            width: 70%;
            float: right;
            padding: 10px;
        }

        .box {
            border: 1px solid black;
            margin-bottom: 10px;
            padding: 10px;
        }

        /* Footer */
        footer {
            clear: both;
            background-color: black;
            color: white;
            text-align: center;
            padding: 10px;
        }
    </style>
</head>

<body>

<!-- Header -->
<header>
    <div class="logo">Logo</div>
    <div class="social">
        Facebook | Twitter | Instagram
    </div>
    <div style="clear:both;"></div>
</header>

<!-- Menu -->
<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<!-- Sidebar -->
<aside>
    <h3>Sidebar</h3>
    <ul>
        <li>Item 1</li>
        <li>Item 2</li>
        <li>Item 3</li>
    </ul>
</aside>

<!-- Main Content -->
<main>
    <h2>Content</h2>

    <div class="box">
        <h3>Title 1</h3>
        <img src="https://via.placeholder.com/100">
        <p>Description 1</p>
    </div>

    <div class="box">
        <h3>Title 2</h3>
        <img src="https://via.placeholder.com/100">
        <p>Description 2</p>
    </div>

    <div class="box">
        <h3>Title 3</h3>
        <img src="https://via.placeholder.com/100">
        <p>Description 3</p>
    </div>
</main>

<!-- Footer -->
<footer>
    Sample Footer Text
</footer>

</body>
</html>
